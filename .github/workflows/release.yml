name: release

# Two ways to cut a release:
#  - push a version tag:   git tag v0.1.0 && git push origin v0.1.0
#  - run manually:         Actions ▸ release ▸ "Run workflow" (enter version)
# Either way this builds static server binaries (-> GitHub Releases) and a
# multi-arch server image (-> GitHub Packages / GHCR). On manual runs the
# workflow itself creates the tag, so no local tag push is required.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release, e.g. v0.1.0"
        required: true
        default: v0.1.0

permissions:
  contents: write # create the release + tag and upload binaries
  packages: write # push the image (and its attestation) to GHCR
  id-token: write # sign provenance via Sigstore
  attestations: write # record build provenance attestations

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }} # e.g. v0.1.0
      semver: ${{ steps.v.outputs.semver }} # e.g. 0.1.0
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="${{ inputs.version }}"
          else
            ver="${{ github.ref_name }}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "semver=${ver#v}" >> "$GITHUB_OUTPUT"

  binaries:
    name: server binary (${{ matrix.arch }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # cross-compiles (incl. the bundled SQLite C code) in a toolchain image.
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build static binary
        run: cross build --release --locked --bin vc-server --target ${{ matrix.target }} --manifest-path server/Cargo.toml
      - name: Package archive + checksum
        run: |
          set -eux
          dist="vc-server-${{ needs.setup.outputs.version }}-${{ matrix.target }}"
          mkdir -p out
          cp "server/target/${{ matrix.target }}/release/vc-server" vc-server
          tar -czf "out/${dist}.tar.gz" vc-server
          sha256sum "out/${dist}.tar.gz" > "out/${dist}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error
      # Raw binary for the image job (no recompilation in Docker).
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.arch }}
          path: server/target/${{ matrix.target }}/release/vc-server
          if-no-files-found: error

  release:
    name: github release
    needs: [setup, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      # SLSA build provenance for the downloadable archives.
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.tar.gz
      # Creates the release and the v* tag (at this run's commit) if absent.
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: ${{ needs.setup.outputs.version }}
          files: dist/*
          generate_release_notes: true

  image:
    name: server image
    needs: [setup, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: bins
      - name: Arrange binaries for buildx
        run: |
          set -eux
          mkdir -p server/ctx/amd64 server/ctx/arm64
          install -m 0755 bins/bin-amd64/vc-server server/ctx/amd64/vc-server
          install -m 0755 bins/bin-arm64/vc-server server/ctx/arm64/vc-server
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: server/ctx
          file: server/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:${{ needs.setup.outputs.semver }}
            ghcr.io/${{ github.repository }}/server:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      # SLSA build provenance for the image, attached to it in GHCR by digest.
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}/server
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
