name: release

# Two ways to cut a release:
#  - push a version tag:   git tag v0.1.0 && git push origin v0.1.0
#  - run manually:         Actions ▸ release ▸ "Run workflow" (enter version)
# Either way this builds static server binaries + a signed/notarized macOS
# desktop client (-> GitHub Releases) and a multi-arch server image (-> GitHub
# Packages / GHCR). On manual runs the workflow itself creates the tag, so no
# local tag push is required.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release, e.g. v0.1.0"
        required: true
        default: v0.1.0

permissions:
  contents: write # create the release + tag and upload binaries
  packages: write # push the image (and its attestation) to GHCR
  id-token: write # sign provenance via Sigstore
  attestations: write # record build provenance attestations

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }} # e.g. v0.1.0
      semver: ${{ steps.v.outputs.semver }} # e.g. 0.1.0
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="${{ inputs.version }}"
          else
            ver="${{ github.ref_name }}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "semver=${ver#v}" >> "$GITHUB_OUTPUT"

  binaries:
    name: server binary (${{ matrix.arch }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # cross-compiles (incl. the bundled SQLite C code) in a toolchain image.
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build static binary
        run: cross build --release --locked --bin malguem-server --target ${{ matrix.target }} --manifest-path server/Cargo.toml
      - name: Package archive + checksum
        run: |
          set -eux
          dist="malguem-server-${{ needs.setup.outputs.version }}-${{ matrix.target }}"
          mkdir -p out
          cp "server/target/${{ matrix.target }}/release/malguem-server" malguem-server
          tar -czf "out/${dist}.tar.gz" malguem-server
          sha256sum "out/${dist}.tar.gz" > "out/${dist}.tar.gz.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error
      # Raw binary for the image job (no recompilation in Docker).
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.arch }}
          path: server/target/${{ matrix.target }}/release/malguem-server
          if-no-files-found: error

  client-macos:
    name: macOS client (universal)
    needs: setup
    # Apple-Silicon runner; we add the x86_64 Rust target to lipo a universal
    # binary so one .dmg runs on both Intel and Apple-Silicon Macs.
    runs-on: macos-latest
    # The Apple signing/notarization credentials live as secrets on the
    # `release` environment, so this job opts into it to read them.
    environment: release
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
      - run: npm ci
      # notarytool reads the API key from a .p8 file on disk, so materialize it
      # from the base64 secret. Skipped (and notarization is too) if the secret
      # is absent, so forks/PRs without credentials still build unsigned.
      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "$APPLE_API_KEY_P8" ]; then
            echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          fi
      # Tauri signs the .app with APPLE_SIGNING_IDENTITY (importing
      # APPLE_CERTIFICATE into a throwaway keychain), turns on the hardened
      # runtime, then notarizes the .dmg with the App Store Connect API key.
      # The `dmg` target builds the .app first, so we don't list it separately.
      # If the signing secrets are absent the build still succeeds, just
      # unsigned — so forks/PRs without secrets aren't blocked.
      - name: Build, sign & notarize universal .dmg
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: npx tauri build --target universal-apple-darwin --bundles dmg
      - name: Package .dmg + checksum
        run: |
          set -eux
          ver="${{ needs.setup.outputs.version }}"
          dist="malguem-${ver}-macos-universal"
          out="$GITHUB_WORKSPACE/out"
          mkdir -p "$out"
          dmg=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -n1)
          cp "$dmg" "$out/${dist}.dmg"
          ( cd "$out" && shasum -a 256 "${dist}.dmg" > "${dist}.dmg.sha256" )
      # SLSA build provenance for the .dmg (same as the Windows .exe). Verify:
      #   gh attestation verify <file>.dmg --repo ${{ github.repository }}
      - uses: actions/attest@v4
        with:
          subject-path: out/*.dmg
      # Picked up by the release job's `release-*` download glob.
      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: out/*
          if-no-files-found: error

  release:
    name: github release
    needs: [setup, binaries, client-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      # SLSA build provenance for the downloadable archives.
      - uses: actions/attest@v4
        with:
          subject-path: dist/*.tar.gz
      # Creates the release and the v* tag (at this run's commit) if absent.
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: ${{ needs.setup.outputs.version }}
          files: dist/*
          generate_release_notes: true

  image:
    name: server image
    needs: [setup, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          pattern: bin-*
          path: bins
      - name: Arrange binaries for buildx
        run: |
          set -eux
          mkdir -p server/ctx/amd64 server/ctx/arm64
          install -m 0755 bins/bin-amd64/malguem-server server/ctx/amd64/malguem-server
          install -m 0755 bins/bin-arm64/malguem-server server/ctx/arm64/malguem-server
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: server/ctx
          file: server/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:${{ needs.setup.outputs.semver }}
            ghcr.io/${{ github.repository }}/server:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      # SLSA build provenance for the image, attached to it in GHCR by digest.
      - uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/server
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
