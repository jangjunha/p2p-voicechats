name: client-windows

# Compiles the Windows desktop client (WebView2). Uses --no-bundle, so it
# produces malguem.exe only — no installer. Download it from the run's
# Artifacts. Also serves as the Windows compile check for the Rust shell.
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "client/**"
      - ".github/workflows/client-windows.yml"

permissions:
  contents: read
  id-token: write # sign the provenance via Sigstore
  attestations: write # record the attestation on the repo

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
      - run: npm ci
      # Builds the frontend (beforeBuildCommand) then the Rust app, skipping
      # installer bundling.
      - run: npx tauri build --no-bundle
      # SLSA build provenance: signed proof this exe came from this repo+commit
      # via this workflow. Verify with:
      #   gh attestation verify malguem.exe --repo jangjunha/malguem
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: client/src-tauri/target/release/malguem.exe
      - uses: actions/upload-artifact@v7
        with:
          name: malguem-windows-exe
          path: client/src-tauri/target/release/malguem.exe
          if-no-files-found: error
